<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neo Calculator Pro</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Segoe UI", sans-serif;
  transition:all 0.2s ease;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
  overflow:hidden;
}

/* BACKGROUND ANIMATION */
.bg{
  position:absolute;
  width:100%;
  height:100%;
  z-index:-2;
}

.blob{
  position:absolute;
  width:280px;
  height:280px;
  border-radius:50%;
  filter:blur(90px);
  opacity:0.6;
  animation:float 12s infinite ease-in-out;
}

.blob1{background:#00f5ff; top:10%; left:10%;}
.blob2{background:#7c3aed; bottom:10%; right:10%; animation-delay:2s;}
.blob3{background:#ff9500; top:60%; left:40%; animation-delay:4s;}

@keyframes float{
  0%{transform:translate(0,0);}
  50%{transform:translate(40px,-40px);}
  100%{transform:translate(0,0);}
}

/* CALCULATOR */
.calculator{
  width:360px;
  padding:20px;
  border-radius:25px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
  color:white;
}

.title{
  font-size:18px;
  font-weight:600;
}

/* TOGGLES */
.toggles{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  margin-bottom:10px;
  color:white;
}

.toggles label{
  display:flex;
  align-items:center;
  gap:4px;
  cursor:pointer;
}

/* DISPLAY */
#display{
  width:100%;
  height:75px;
  font-size:32px;
  text-align:right;
  padding:15px;
  border:none;
  outline:none;
  border-radius:15px;
  background:rgba(0,0,0,0.3);
  color:white;
  margin-bottom:15px;
}

/* BUTTON GRID */
.buttons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

/* BUTTONS */
button{
  height:65px;
  border:none;
  border-radius:15px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:20px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:translateY(-3px);
  background:rgba(255,255,255,0.2);
}

button:active{
  transform:scale(0.95);
}

/* SPECIAL */
.operator{background:#ff9500;}
.equal{background:#00c853; grid-column:span 2;}
.clear{background:#ff3b30;}
.zero{grid-column:span 2;}

/* LIGHT MODE */
body.light{
  background:linear-gradient(135deg,#e2e8f0,#f8fafc);
}

body.light .calculator{
  background:rgba(255,255,255,0.5);
}

body.light #display,
body.light button,
body.light .title{
  color:#111;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="calculator">

  <div class="top">
    <div class="title">NeoCalc Pro</div>
  </div>

  <!-- TOGGLES -->
  <div class="toggles">
    <label>🌙 <input type="checkbox" id="theme"></label>
    <label>🔊 <input type="checkbox" id="sound"></label>
    <label>✨ <input type="checkbox" id="anim" checked></label>
  </div>

  <input id="display" disabled>

  <div class="buttons">

    <button class="clear" onclick="clearDisplay()">C</button>
    <button onclick="appendValue('/')">÷</button>
    <button onclick="appendValue('*')">×</button>
    <button onclick="appendValue('-')">−</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button onclick="appendValue('+')">+</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button onclick="appendValue('.')">.</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button onclick="deleteLast()">⌫</button>

    <button class="zero" onclick="appendValue('0')">0</button>
    <button class="equal" onclick="calculate()">=</button>

  </div>

</div>

<script>

const display = document.getElementById("display");
const theme = document.getElementById("theme");
const sound = document.getElementById("sound");
const anim = document.getElementById("anim");

let soundEnabled = false;
let animEnabled = true;

const clickSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

function playSound(){
  if(soundEnabled){
    clickSound.currentTime = 0;
    clickSound.play();
  }
}

function appendValue(v){
  playSound();

  if(display.value === "Error") display.value = "";

  display.value += v;

  if(animEnabled){
    display.style.transform = "scale(1.03)";
    setTimeout(()=>display.style.transform="scale(1)",100);
  }
}

function clearDisplay(){
  display.value="";
}

function deleteLast(){
  display.value = display.value.slice(0,-1);
}

function calculate(){
  try{
    display.value = eval(display.value);
  }catch{
    display.value = "Error";
  }
}

/* TOGGLES */
theme.addEventListener("change",()=>{
  document.body.classList.toggle("light");
});

sound.addEventListener("change",()=>{
  soundEnabled = sound.checked;
});

anim.addEventListener("change",()=>{
  animEnabled = anim.checked;
});

/* KEYBOARD SUPPORT */
document.addEventListener("keydown",(e)=>{
  if("0123456789+-*/.".includes(e.key)){
    appendValue(e.key);
  }
  else if(e.key==="Enter") calculate();
  else if(e.key==="Backspace") deleteLast();
  else if(e.key==="Escape") clearDisplay();
});

</script>

</body>
</html>
